app = "paperboat-crm-api"

[env]
  PORT = "3001"

[[services]]
  protocol = "tcp"
  internal_port = 3001
  auto_start_machines = true
  auto_stop_machines = true
  min_machines_running = 0

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
