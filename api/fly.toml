# fly.toml app configuration
# Deploy from repo root: fly deploy --config api/fly.toml

app = 'sharkly-api'
primary_region = 'iad'

[build]
  dockerfile = "api/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
